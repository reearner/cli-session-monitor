<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22252e"/>
      <stop offset="1" stop-color="#13151a"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.46" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#7cb4ff"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2161e6"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <!-- pulse rings (live monitoring) -->
  <circle cx="512" cy="512" r="312" fill="none" stroke="#3b82f6" stroke-width="10" opacity="0.16"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#3b82f6" stroke-width="14" opacity="0.30"/>
  <!-- orb (the floating ball) -->
  <circle cx="512" cy="512" r="172" fill="url(#orb)"/>
  <circle cx="466" cy="462" r="58" fill="#ffffff" opacity="0.26"/>
  <!-- status accents: running / waiting / done -->
