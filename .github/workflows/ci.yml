name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cross-platform crates (no GUI) + frontend typecheck — fast.
  core:
    name: core crates + frontend (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test cross-platform crates
        run: cargo test -p csm-core -p csm-reporter -p csm-watch -p csm-agent --locked
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # Full workspace incl. the Tauri app (needs Windows + WebView2).
  windows:
    name: full workspace (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  # Lint — informational for now (doesn't block the build).
  lint:
    name: fmt + clippy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy -p csm-core -p csm-reporter -p csm-watch -p csm-agent -- -D warnings
