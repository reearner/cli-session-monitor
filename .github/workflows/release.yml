name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the Windows
# installer and publish it to a (draft) GitHub Release.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign the updater artifacts + generate latest.json (required because
          # bundle.createUpdaterArtifacts is on). Set these repo secrets before
          # tagging, or this build fails.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CLI Session Monitor ${{ github.ref_name }}
          releaseBody: "See [CHANGELOG.md](https://github.com/reearner/cli-session-monitor/blob/main/CHANGELOG.md) for the full list of changes.\n\n**Windows:** download the `*-setup.exe` (or `.msi`) below.\n**Remote monitoring (Linux):** the exported `remote-agent.sh` auto-downloads `csm-remote-x86_64-linux.tar.gz` on first run (curl/wget on x86_64 Linux).\n\nInstallers are signed for in-app auto-update; `SHA256SUMS.txt` lists checksums."
          releaseDraft: true
          prerelease: false

      # Publish SHA-256 checksums of the installers so downloads can be verified.
      # Best-effort: never fail the release if paths differ.
      - name: Publish checksums
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Workspace target is at the repo root (target/release/bundle); also
          # check src-tauri/ in case of a non-workspace layout.
          $bundles = @("target/release/bundle", "src-tauri/target/release/bundle") |
            Where-Object { Test-Path $_ }
          $files = @()
          foreach ($b in $bundles) {
            $files += Get-ChildItem $b -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue
          }
          if (-not $files) { Write-Host "no installers found, skipping"; exit 0 }
          $files | ForEach-Object { "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash, $_.Name } |
            Out-File -FilePath SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt
          gh release upload ${{ github.ref_name }} SHA256SUMS.txt --clobber

  # Prebuilt, fully-static Linux binaries for remote monitoring (csm-agent +
  # session-reporter), so a server never needs Rust installed. musl target =>
  # no glibc dependency, runs on any x86_64 Linux (incl. Alpine / old distros).
  linux-agent:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - name: Build static Linux binaries
        run: cargo build --release --target x86_64-unknown-linux-musl -p csm-agent -p csm-reporter
      - name: Package + checksum
        run: |
          d=target/x86_64-unknown-linux-musl/release
          tar -C "$d" -czf csm-remote-x86_64-linux.tar.gz csm-agent session-reporter
          sha256sum csm-remote-x86_64-linux.tar.gz | tee csm-remote-x86_64-linux.tar.gz.sha256
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            csm-remote-x86_64-linux.tar.gz csm-remote-x86_64-linux.tar.gz.sha256 --clobber
